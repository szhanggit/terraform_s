---
- name: Provision Grafana EC2 instance
  hosts: grafana
  become: true

  tasks:
    # ---------------------------------------------------------------
    # System basics
    # ---------------------------------------------------------------
    - name: Wait for apt locks to be released
      shell: while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do sleep 2; done
      changed_when: false

    - name: Update apt cache
      command: apt-get update
      changed_when: false

    - name: Upgrade apt packages
      command: apt-get dist-upgrade -y
      environment:
        DEBIAN_FRONTEND: noninteractive
      changed_when: false
      register: apt_upgrade
      retries: 10
      delay: 5
      until: apt_upgrade.rc == 0

    - name: Update apt cache (module)
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - git
          - tmux
          - unzip
          - jq
          - wget
        state: present

    # ---------------------------------------------------------------
    # Install musl and font dependencies
    # ---------------------------------------------------------------
    - name: Install musl and font dependencies
      apt:
        name:
          - adduser
          - libfontconfig1
          - musl
        state: present

    # ---------------------------------------------------------------
    # Install Grafana
    # ---------------------------------------------------------------
    - name: Download Grafana deb package
      command: wget https://dl.grafana.com/oss/release/grafana_10.2.2_amd64.deb
      args:
        chdir: /home/ubuntu

    - name: Install Grafana deb package
      command: dpkg -i grafana_10.2.2_amd64.deb
      args:
        chdir: /home/ubuntu

    # ---------------------------------------------------------------
    # Start Grafana
    # ---------------------------------------------------------------
    - name: Reload systemd daemon
      command: systemctl daemon-reload
      changed_when: false

    - name: Enable grafana-server
      command: systemctl enable grafana-server
      changed_when: false

    - name: Start grafana-server
      command: systemctl start grafana-server
      changed_when: false

    # ---------------------------------------------------------------
    # Provision datasources: Prometheus (metrics) + Tempo (traces)
    # ---------------------------------------------------------------
    - name: Read Prometheus IP
      set_fact:
        prometheus_ip: "{{ lookup('file', 'prometheus_ip.txt') | trim }}"

    - name: Read Tempo IP
      set_fact:
        tempo_ip: "{{ lookup('file', 'tempo_ip.txt') | trim }}"

    - name: Ensure Grafana provisioning datasources directory exists
      file:
        path: /etc/grafana/provisioning/datasources
        state: directory
        owner: grafana
        group: grafana
        mode: '0755'

    - name: Provision Prometheus datasource
      copy:
        dest: /etc/grafana/provisioning/datasources/prometheus.yml
        owner: grafana
        group: grafana
        mode: '0644'
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              uid: prometheus
              access: proxy
              url: http://{{ prometheus_ip }}:9090/
              isDefault: false
              jsonData:
                httpMethod: POST
                exemplarTraceIdDestinations:
                  - name: trace_id
                    datasourceUid: tempo

    - name: Provision Tempo datasource
      copy:
        dest: /etc/grafana/provisioning/datasources/tempo.yml
        owner: grafana
        group: grafana
        mode: '0644'
        content: |
          apiVersion: 1
          datasources:
            - name: Tempo
              type: tempo
              uid: tempo
              access: proxy
              url: http://{{ tempo_ip }}:3200/
              isDefault: true
              jsonData:
                httpMethod: GET
                serviceMap:
                  datasourceUid: prometheus
                tracesToMetricsV2:
                  datasourceUid: prometheus
                  tags:
                    - key: service.name
                      value: service
                  queries:
                    - name: Sample query
                      query: sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m]))
                traceQuery:
                  timeShiftEnabled: true
                  spanStartTimeShift: 1h
                  spanEndTimeShift: -1h
                spanBar:
                  type: None

    - name: Restart grafana-server to apply datasources
      command: systemctl restart grafana-server
      changed_when: true
