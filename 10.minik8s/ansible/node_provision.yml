---
# Play 1: get a fresh join command from the master
- name: Retrieve join command from master
  hosts: master
  become: yes
  tasks:
    - name: Generate kubeadm join command
      command: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Store join command as host fact
      set_fact:
        join_command: "{{ join_command_raw.stdout }} --cri-socket unix:///var/run/cri-dockerd.sock"

# Play 2: install prerequisites and join the cluster on the worker node
- name: Provision Kubernetes Worker Node
  hosts: node
  become: yes

  vars:
    cri_dockerd_version: "0.4.3"

  tasks:

    # -----------------------------------------------------------------------
    # System basics
    # -----------------------------------------------------------------------

    - name: Wait for apt locks to be released
      shell: while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do sleep 2; done
      changed_when: false

    - name: Update apt cache
      command: apt-get update
      changed_when: false

    - name: Upgrade apt packages
      command: apt-get dist-upgrade -y
      environment:
        DEBIAN_FRONTEND: noninteractive
      changed_when: false
      register: apt_upgrade
      retries: 10
      delay: 5
      until: apt_upgrade.rc == 0

    - name: Update apt cache (module)
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - git
          - tmux
          - unzip
          - jq
          - wget
        state: present

    # -----------------------------------------------------------------------
    # Docker
    # -----------------------------------------------------------------------

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Configure Docker cgroupdriver (systemd)
      copy:
        dest: /etc/docker/daemon.json
        mode: '0644'
        content: |
          {
            "exec-opts": ["native.cgroupdriver=systemd"]
          }

    - name: Enable and restart Docker
      systemd:
        name: docker
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # -----------------------------------------------------------------------
    # Kernel modules (br_netfilter, overlay)
    # -----------------------------------------------------------------------

    - name: Configure kernel modules for Kubernetes
      copy:
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'
        content: |
          overlay
          br_netfilter

    - name: Load overlay module
      modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Configure sysctl for Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        mode: '0644'
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Apply sysctl parameters
      command: sysctl --system

    # -----------------------------------------------------------------------
    # cri-dockerd
    # -----------------------------------------------------------------------

    - name: Download cri-dockerd tarball
      get_url:
        url: "https://github.com/Mirantis/cri-dockerd/releases/download/v{{ cri_dockerd_version }}/cri-dockerd-{{ cri_dockerd_version }}.amd64.tgz"
        dest: "/tmp/cri-dockerd-{{ cri_dockerd_version }}.tgz"
        mode: '0644'

    - name: Extract cri-dockerd
      unarchive:
        src: "/tmp/cri-dockerd-{{ cri_dockerd_version }}.tgz"
        dest: /tmp/
        remote_src: yes

    - name: Install cri-dockerd binary
      copy:
        src: /tmp/cri-dockerd/cri-dockerd
        dest: /usr/bin/cri-dockerd
        mode: '0755'
        remote_src: yes

    - name: Download cri-docker.service
      get_url:
        url: "https://raw.githubusercontent.com/Mirantis/cri-dockerd/master/packaging/systemd/cri-docker.service"
        dest: /etc/systemd/system/cri-docker.service

    - name: Download cri-docker.socket
      get_url:
        url: "https://raw.githubusercontent.com/Mirantis/cri-dockerd/master/packaging/systemd/cri-docker.socket"
        dest: /etc/systemd/system/cri-docker.socket

    # Add pause image — binary path /usr/bin/cri-dockerd already matches service file default
    - name: Configure cri-dockerd pause image (Aliyun mirror)
      lineinfile:
        path: /etc/systemd/system/cri-docker.service
        regexp: 'ExecStart=/usr/bin/cri-dockerd.*'
        line: 'ExecStart=/usr/bin/cri-dockerd --container-runtime-endpoint fd:// --pod-infra-container-image=registry.k8s.io/pause:3.9'

    - name: Enable and start cri-docker socket
      systemd:
        name: cri-docker.socket
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Enable and start cri-docker service
      systemd:
        name: cri-docker
        state: started
        enabled: yes

    # -----------------------------------------------------------------------
    # Disable swap
    # -----------------------------------------------------------------------

    - name: Disable swap
      command: swapoff -a

    - name: Remove swap entries from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '#\1'

    # -----------------------------------------------------------------------
    # Kubernetes packages
    # -----------------------------------------------------------------------

    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Kubernetes GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key |
        gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        mode: '0644'
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /\n"

    - name: Install kubeadm, kubelet, kubectl
      apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        update_cache: yes
        state: present

    - name: Hold Kubernetes packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl

    # -----------------------------------------------------------------------
    # Join the cluster
    # -----------------------------------------------------------------------

    - name: Check if node already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: node_joined

    - name: Join Kubernetes cluster
      command: "{{ hostvars['master']['join_command'] }}"
      when: not node_joined.stat.exists
