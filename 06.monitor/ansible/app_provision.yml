---
- name: Provision app EC2 instance
  hosts: app
  become: true
  vars:
    docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg
    docker_repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

  tasks:
    # ---------------------------------------------------------------
    # System basics
    # ---------------------------------------------------------------
    - name: Wait for apt locks to be released
      shell: while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do sleep 2; done
      changed_when: false

    - name: Update apt cache
      command: apt-get update
      changed_when: false

    - name: Upgrade apt packages
      command: apt-get dist-upgrade -y
      environment:
        DEBIAN_FRONTEND: noninteractive
      changed_when: false
      register: apt_upgrade
      retries: 10
      delay: 5
      until: apt_upgrade.rc == 0

    - name: Update apt cache (module)
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - git
          - tmux
          - sqlite3
          - mysql-client
          - unzip
          - jq
        state: present

    # ---------------------------------------------------------------
    # Add Group and User
    # ---------------------------------------------------------------
    - name: Create prometheus system group
      group:
        name: prometheus
        system: true

    - name: Create prometheus system user
      user:
        name: prometheus
        group: prometheus
        shell: /sbin/nologin
        system: true
        create_home: false

    # ---------------------------------------------------------------
    # Make folder and set priviledge
    # ---------------------------------------------------------------
    - name: Create /var/lib/node directory with ownership and permissions
      file:
        path: /var/lib/node
        state: directory
        owner: prometheus
        group: prometheus
        mode: '0775'
        recurse: true

    # ---------------------------------------------------------------
    # Add Exporter
    # ---------------------------------------------------------------
    - name: Download node_exporter
      command: wget https://github.com/prometheus/node_exporter/releases/download/v1.11.1/node_exporter-1.11.1.linux-amd64.tar.gz
      args:
        chdir: /home/ubuntu

    - name: Extract node_exporter
      command: tar -xvf node_exporter-1.11.1.linux-amd64.tar.gz
      args:
        chdir: /home/ubuntu

    # ---------------------------------------------------------------
    # Set exporter config and start exporter
    # ---------------------------------------------------------------
    - name: Move node_exporter binary to /var/lib/node/
      copy:
        src: /home/ubuntu/node_exporter-1.11.1.linux-amd64/node_exporter
        dest: /var/lib/node/node_exporter
        mode: '0755'
        remote_src: true

    - name: Create node_exporter.service systemd unit file
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          Documentation=https://prometheus.io/docs/introduction/overview/
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=simple
          User=prometheus
          Group=prometheus
          ExecReload=/bin/kill -HUP $MAINPID
          ExecStart=/var/lib/node/node_exporter
          SyslogIdentifier=prometheus_node_exporter
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true

    # ---------------------------------------------------------------
    # Docker
    # ---------------------------------------------------------------
    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      get_url:
        url: "{{ docker_gpg_url }}"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository
      apt_repository:
        repo: "{{ docker_repo }}"
        state: present

    - name: Install Docker CE
      apt:
        name: docker-ce
        state: present

    - name: Install Docker Compose plugin
      apt:
        name: docker-compose-plugin
        state: present

    - name: Enable docker service
      command: systemctl enable docker
      changed_when: false

    - name: Start docker service
      command: systemctl start docker
      changed_when: false

    - name: Wait for Docker socket to be ready
      wait_for:
        path: /var/run/docker.sock
        state: present
        timeout: 30

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    # ---------------------------------------------------------------
    # .NET 10 ASP.NET Core Runtime
    # ---------------------------------------------------------------
    - name: Download dotnet-install script
      get_url:
        url: https://dot.net/v1/dotnet-install.sh
        dest: /tmp/dotnet-install.sh
        mode: '0755'

    - name: Install ASP.NET Core Runtime 10
      shell: /tmp/dotnet-install.sh --channel 10.0 --runtime aspnetcore --install-dir /usr/share/dotnet
      args:
        creates: /usr/share/dotnet/dotnet

    - name: Create dotnet symlink in PATH
      file:
        src: /usr/share/dotnet/dotnet
        dest: /usr/local/bin/dotnet
        state: link


    # ---------------------------------------------------------------
    # Install and run ShoeHub
    # ---------------------------------------------------------------
    - name: Clone ShoeHub repository
      git:
        repo: https://github.com/aussiearef/shoehubv2
        dest: /home/ubuntu/shoehubv2
        version: HEAD

    - name: Build ShoeHub Docker image
      command: docker build -t shoehub .
      args:
        chdir: /home/ubuntu/shoehubv2/ShoeHubV2

    - name: List Docker images
      command: docker image ls
      changed_when: false
      register: docker_images

    - name: Show Docker images
      debug:
        var: docker_images.stdout_lines

    - name: Run ShoeHub container
      command: docker run -d -p 8020:8080 --name shoehub shoehub