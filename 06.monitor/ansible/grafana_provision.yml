---
- name: Provision grafana EC2 instance
  hosts: grafana
  become: true

  tasks:
    # ---------------------------------------------------------------
    # System basics
    # ---------------------------------------------------------------
    - name: Wait for apt locks to be released
      shell: while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do sleep 2; done
      changed_when: false

    - name: Update apt cache
      command: apt-get update
      changed_when: false
      register: apt_update
      retries: 10
      delay: 5
      until: apt_update.rc == 0

    - name: Upgrade apt packages
      command: apt-get dist-upgrade -y
      environment:
        DEBIAN_FRONTEND: noninteractive
      changed_when: false
      register: apt_upgrade
      retries: 10
      delay: 5
      until: apt_upgrade.rc == 0

    - name: Update apt cache (module)
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - git
          - tmux
          - sqlite3
          - mysql-client
          - unzip
          - jq
          - wget
        state: present

    # ---------------------------------------------------------------
    # Install musl
    # ---------------------------------------------------------------
    - name: Install musl and font dependencies
      apt:
        name:
          - adduser
          - libfontconfig1
          - musl
        state: present

    # ---------------------------------------------------------------
    # Install Grafana
    # ---------------------------------------------------------------
    - name: Download Grafana deb package
      command: wget https://dl.grafana.com/oss/release/grafana_10.2.2_amd64.deb
      args:
        chdir: /home/ubuntu

    - name: Install Grafana deb package
      command: dpkg -i grafana_10.2.2_amd64.deb
      args:
        chdir: /home/ubuntu

    # ---------------------------------------------------------------
    # Start Grafana
    # ---------------------------------------------------------------
    - name: Reload systemd daemon
      command: systemctl daemon-reload
      changed_when: false

    - name: Enable grafana-server
      command: systemctl enable grafana-server
      changed_when: false

    - name: Start grafana-server
      command: systemctl start grafana-server
      changed_when: false
