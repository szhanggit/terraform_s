---
- name: Provision dotnet app EC2 instance
  hosts: dotnet_app
  become: true
  vars:
    docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg
    docker_repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    prometheus_ip: "{{ lookup('file', 'prometheus_ip.txt') | trim }}"
    loki_ip: "{{ lookup('file', 'loki_ip.txt') | trim }}"

  tasks:
    # ---------------------------------------------------------------
    # System basics
    # ---------------------------------------------------------------
    - name: Wait for apt locks to be released
      shell: while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do sleep 2; done
      changed_when: false

    - name: Update apt cache
      command: apt-get update
      changed_when: false

    - name: Upgrade apt packages
      command: apt-get dist-upgrade -y
      environment:
        DEBIAN_FRONTEND: noninteractive
      changed_when: false
      register: apt_upgrade
      retries: 10
      delay: 5
      until: apt_upgrade.rc == 0

    - name: Update apt cache (module)
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - git
          - tmux
          - sqlite3
          - mysql-client
          - unzip
          - jq
        state: present

    # ---------------------------------------------------------------
    # Docker
    # ---------------------------------------------------------------
    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      get_url:
        url: "{{ docker_gpg_url }}"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository
      apt_repository:
        repo: "{{ docker_repo }}"
        state: present

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable docker service
      command: systemctl enable docker
      changed_when: false

    - name: Start docker service
      command: systemctl start docker
      changed_when: false

    - name: Wait for Docker socket to be ready
      wait_for:
        path: /var/run/docker.sock
        state: present
        timeout: 30

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    # ---------------------------------------------------------------
    # .NET 10 ASP.NET Core Runtime
    # ---------------------------------------------------------------
    - name: Download dotnet-install script
      get_url:
        url: https://dot.net/v1/dotnet-install.sh
        dest: /tmp/dotnet-install.sh
        mode: '0755'

    - name: Install ASP.NET Core Runtime 10
      shell: /tmp/dotnet-install.sh --channel 10.0 --runtime aspnetcore --install-dir /usr/share/dotnet
      args:
        creates: /usr/share/dotnet/dotnet

    - name: Create dotnet symlink in PATH
      file:
        src: /usr/share/dotnet/dotnet
        dest: /usr/local/bin/dotnet
        state: link

    # ---------------------------------------------------------------
    # Install and run ShoeHub
    # ---------------------------------------------------------------
    - name: Clone ShoeHub repository
      git:
        repo: https://github.com/aussiearef/shoehubv2
        dest: /home/ubuntu/shoehubv2
        version: HEAD

    - name: Build ShoeHub Docker image
      command: docker build -t shoehub .
      args:
        chdir: /home/ubuntu/shoehubv2/ShoeHubV2

    - name: Run ShoeHub container
      command: docker run -d -p 8020:8080 --name shoehub shoehub

    # ---------------------------------------------------------------
    # Install Grafana Alloy
    # ---------------------------------------------------------------
    - name: Create /etc/apt/keyrings directory for Grafana
      command: mkdir -p /etc/apt/keyrings
      changed_when: false

    - name: Download Grafana GPG key
      command: wget -qO /etc/apt/keyrings/grafana.asc https://apt.grafana.com/gpg-full.key
      changed_when: false

    - name: Add Grafana apt repository
      shell: echo "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main" | tee /etc/apt/sources.list.d/grafana.list
      changed_when: false

    - name: Update apt cache after adding Grafana repository
      command: apt-get update
      changed_when: false

    - name: Install Grafana Alloy
      command: apt-get install alloy -y
      changed_when: false

    # ---------------------------------------------------------------
    # Configure Grafana Alloy
    # Collects node metrics and ShoeHub metrics → Prometheus
    # Collects system and ShoeHub logs → Loki
    # ---------------------------------------------------------------
    - name: Create Alloy config directory
      file:
        path: /etc/alloy
        state: directory
        mode: '0755'

    - name: Create Alloy config
      copy:
        dest: /etc/alloy/config.alloy
        content: |
          // ===========================================================
          // Node metrics (replaces node_exporter)
          // ===========================================================
          prometheus.exporter.unix "node_metrics" { }

          prometheus.scrape "node_scrape" {
            targets    = prometheus.exporter.unix.node_metrics.targets
            forward_to = [prometheus.remote_write.prom.receiver]
            job_name   = "node"
          }

          // ===========================================================
          // ShoeHub application metrics
          // ===========================================================
          prometheus.scrape "shoehub_scrape" {
            targets = [{
              "__address__" = "localhost:8020",
            }]
            forward_to = [prometheus.remote_write.prom.receiver]
            job_name   = "shoehub"
          }

          // ===========================================================
          // Forward metrics to Prometheus via remote write
          // ===========================================================
          prometheus.remote_write "prom" {
            endpoint {
              url = "http://{{ prometheus_ip }}:9090/api/v1/write"
            }
          }

          // ===========================================================
          // Collect system logs
          // ===========================================================
          local.file_match "system_logs" {
            path_targets = [{
              "__path__" = "/var/log/*log",
              "job"      = "varlogs",
              "team"     = "DevOps",
              "env"      = "Prod",
              "host"     = "dotnet-app",
            }]
          }

          loki.source.file "system_log_source" {
            targets    = local.file_match.system_logs.targets
            forward_to = [loki.write.loki.receiver]
          }

          // ===========================================================
          // Collect ShoeHub application logs
          // ===========================================================
          local.file_match "shoehub_logs" {
            path_targets = [{
              "__path__" = "/var/log/shoehub/log*",
              "job"      = "shoehub",
              "app"      = "shoehub",
              "host"     = "dotnet-app",
            }]
          }

          loki.source.file "shoehub_log_source" {
            targets    = local.file_match.shoehub_logs.targets
            forward_to = [loki.write.loki.receiver]
          }

          // ===========================================================
          // Forward logs to Loki
          // ===========================================================
          loki.write "loki" {
            endpoint {
              url = "http://{{ loki_ip }}:3100/loki/api/v1/push"
            }
          }

    # ---------------------------------------------------------------
    # Start Grafana Alloy
    # ---------------------------------------------------------------
    - name: Reload systemd daemon
      command: systemctl daemon-reload
      changed_when: false

    - name: Enable alloy service
      command: systemctl enable alloy
      changed_when: false

    - name: Start alloy service
      command: systemctl start alloy
      changed_when: false
